<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Доступ к уведомлениям</title>
    <style>
        body { background: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        button { padding: 20px 40px; font-size: 24px; border: none; background: #007bff; color: white; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="subscribe()">✅ Разрешить уведомления</button>
    <script>
        async function subscribe() {
            if (!('serviceWorker' in navigator)) {
                alert('Service Worker не поддерживается');
                return;
            }

            // 1. Регистрируем SW
            const reg = await navigator.serviceWorker.register('sw.js');

            // 2. Запрашиваем разрешение
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') {
                alert('Разрешение не получено');
                return;
            }

            // 3. Генерируем VAPID-ключ (временно используем публичный)
            const vapidKey = 'BOtV7FzF...'; // замените на свой сгенерированный в консоли браузера

            // 4. Подписываемся на push
            const sub = await reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: vapidKey
            });

            // 5. Показываем токен
            alert('Ваш токен:\n' + sub.toJSON().endpoint);
            document.body.innerHTML = ''; // белый экран
        }
    </script>
</body>
</html>
