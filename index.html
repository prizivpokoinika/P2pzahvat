<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СкачайМакс | Генератор QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a1e2c, #2b3042);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 32px 28px 40px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f9e05d, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .header p {
            color: #b9c2d9;
            font-size: 0.95rem;
            margin-top: 6px;
            opacity: 0.8;
        }

        .qr-wrapper {
            background: #ffffff;
            padding: 24px;
            border-radius: 40px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: fit-content;
        }

        #qrcode canvas {
            display: block !important;
            max-width: 100%;
            height: auto;
            border-radius: 24px;
        }

        .logo-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 3px solid #ffd966;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.8rem;
            color: #1a1e2c;
            background: #f9e05d;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .info-row .label {
            color: #ccd6f0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .info-row .badge {
            background: #ffd966;
            color: #1a1e2c;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 6px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            background: #2f354a;
            color: #eef3ff;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-primary {
            background: linear-gradient(145deg, #f7d44a, #f0b33c);
            color: #1a1e2c;
            font-weight: 700;
            border: 1px solid #ffe28a;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.25);
        }

        .btn-primary:hover {
            transform: scale(1.02);
            background: linear-gradient(145deg, #ffe066, #f7b83a);
            box-shadow: 0 12px 28px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #ffd966;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #6a7292;
            border-top: 1px solid rgba(255, 215, 0, 0.08);
            padding-top: 18px;
        }

        .footer-note span {
            color: #ffd966;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .card { padding: 20px 16px; }
            .header h1 { font-size: 2rem; }
            .logo-overlay { width: 56px; height: 56px; font-size: 1.4rem; }
            .info-row { padding-left: 14px; flex-wrap: wrap; gap: 6px; }
            .btn { font-size: 1rem; padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📲 СкачайМакс</h1>
            <p>Генератор QR для Макса</p>
        </div>

        <div class="qr-wrapper">
            <div id="qrcode" style="position: relative; display: inline-block;">
                <div class="logo-overlay">
                    <span>M</span>
                </div>
            </div>
        </div>

        <div class="info-row">
            <span class="label">⚡ MAX.apk</span>
            <span class="badge">СкачайМакс</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="downloadApkBtn">
                ⬇️ Скачать MAX.apk
            </button>
            <button class="btn btn-secondary" id="downloadQrBtn">
                🖼️ Сохранить QR (PNG)
            </button>
        </div>

        <div class="footer-note">
            <span>#</span> При сканировании QR — автозагрузка APK
        </div>
    </div>

    <script>
        (function() {
            // ===== НАСТРОЙКА: УКАЖИТЕ ВАШУ ССЫЛКУ НА APK В GITHUB =====
            // Пример: https://raw.githubusercontent.com/ВАШ_АККАУНТ/ВАШ_РЕПО/ВЕТКА/MAX.apk
            const APK_DOWNLOAD_URL = 'https://raw.githubusercontent.com/ВАШ_АККАУНТ/ВАШ_РЕПО/main/MAX.apk';
            // ===========================================================

            // Генерация QR-кода
            const qrContainer = document.getElementById('qrcode');
            
            // Очищаем старые canvas, сохраняя логотип
            const children = qrContainer.children;
            for (let i = children.length - 1; i >= 0; i--) {
                const child = children[i];
                if (!child.classList || !child.classList.contains('logo-overlay')) {
                    qrContainer.removeChild(child);
                }
            }

            const qrSize = Math.min(320, window.innerWidth - 80);
            const qrCode = new QRCode(qrContainer, {
                text: APK_DOWNLOAD_URL,
                width: qrSize,
                height: qrSize,
                colorDark: "#1a1e2c",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Кнопка скачивания APK
            document.getElementById('downloadApkBtn').addEventListener('click', function(e) {
                const link = document.createElement('a');
                link.href = APK_DOWNLOAD_URL;
                link.download = 'MAX.apk';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            // Кнопка сохранения QR
            document.getElementById('downloadQrBtn').addEventListener('click', function() {
                const canvas = qrContainer.querySelector('canvas');
                if (!canvas) {
                    alert('QR-код ещё не загружен');
                    return;
                }

                const overlayCanvas = document.createElement('canvas');
                const ctx = overlayCanvas.getContext('2d');
                const size = canvas.width;

                overlayCanvas.width = size;
                overlayCanvas.height = size;

                ctx.drawImage(canvas, 0, 0, size, size);

                const center = size / 2;
                const logoRadius = size * 0.14;
                const gradient = ctx.createRadialGradient(center, center, 0, center, center, logoRadius);
                gradient.addColorStop(0, '#f9e05d');
                gradient.addColorStop(1, '#f0b33c');
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.arc(center, center, logoRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffd966';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = '#1a1e2c';
                ctx.font = `bold ${logoRadius * 1.1}px 'Segoe UI', system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 8;
                ctx.fillText('M', center, center + 2);
                ctx.shadowBlur = 0;

                const link = document.createElement('a');
                link.download = 'qrcode_max.png';
                link.href = overlayCanvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            console.log('✅ Генератор "СкачайМакс" запущен');
            console.log('📱 QR ведёт на: ' + APK_DOWNLOAD_URL);
        })();
    </script>
</body>
</html>
