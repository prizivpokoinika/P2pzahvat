<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент — отдаю экран</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d0d1a; color: #eee; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; background: #1a1a2e; padding: 25px; border-radius: 24px; box-shadow: 0 8px 40px #000000cc; }
        h2 { margin-top: 0; color: #b7b7ff; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .col { flex: 1; min-width: 260px; background: #22223b; padding: 18px; border-radius: 16px; }
        textarea { width: 100%; height: 140px; background: #0f0f1f; color: #8f8; border: 1px solid #3a3a5a; border-radius: 12px; padding: 12px; font-size: 13px; resize: vertical; }
        button { background: #6c5ce7; border: none; color: #fff; padding: 12px 22px; border-radius: 40px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; margin: 4px 0; }
        button:hover { background: #5a4bcf; transform: scale(1.02); }
        button.success { background: #27ae60; }
        button.success:hover { background: #1e8449; }
        video { width: 100%; max-height: 280px; background: #111; border-radius: 14px; border: 1px solid #444; }
        .status { display: inline-block; padding: 8px 18px; border-radius: 30px; font-weight: bold; margin: 6px 0; background: #333; color: #aaa; }
        .status.on { background: #27ae60; color: #fff; }
        .status.off { background: #e74c3c; color: #fff; }
        .log { background: #0b0b16; border-radius: 12px; padding: 12px; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 13px; border: 1px solid #2a2a44; margin-top: 12px; }
        .log span { color: #8f8; }
        hr { border-color: #333; margin: 16px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>🖥 Клиент — отдаю экран</h2>
    <div class="row">
        <div class="col">
            <h3>1. Захват</h3>
            <button class="success" onclick="captureScreen()">🖱 Захватить экран</button>
            <div id="status" class="status off">● Ожидание</div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="col">
            <h3>2. OFFER для оператора</h3>
            <textarea id="offerBox" readonly placeholder="Здесь будет OFFER..."></textarea>
            <button onclick="copyText('offerBox')">📋 Копировать OFFER</button>
            <hr>
            <h3>3. Вставить ANSWER</h3>
            <textarea id="answerBox" placeholder='Вставьте ANSWER (JSON)...'></textarea>
            <button class="success" onclick="acceptAnswer()">✅ Принять ANSWER</button>
            <div id="log" class="log"><span>→ Готов к работе</span></div>
        </div>
    </div>
</div>
<script>
    let pc = null, stream = null;
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // Проверка поддержки API
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        document.getElementById('log').innerHTML = '<span>❌ Ваш браузер не поддерживает getDisplayMedia. Используйте Chrome/Edge на HTTPS.</span>';
    }

    async function captureScreen() {
        try {
            if (!navigator.mediaDevices?.getDisplayMedia) {
                throw new Error('getDisplayMedia не поддерживается. Используйте Chrome/Edge через HTTPS.');
            }
            stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            setStatus('● Экран захвачен', true);
            log('✅ Экран захвачен, создаю OFFER...');

            pc = new RTCPeerConnection(config);
            stream.getTracks().forEach(t => pc.addTrack(t, stream));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            document.getElementById('offerBox').value = JSON.stringify(offer, null, 2);
            setStatus('● OFFER готов', true);
            log('✅ OFFER создан, отправьте оператору');
        } catch (e) {
            setStatus('● Ошибка: ' + e.message, false);
            log('❌ ' + e.message);
        }
    }

    async function acceptAnswer() {
        const raw = document.getElementById('answerBox').value.trim();
        if (!raw) { log('❌ Вставьте ANSWER'); return; }
        try {
            const answer = JSON.parse(raw);
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
            setStatus('● Соединение установлено', true);
            log('✅ P2P активно! Оператор видит экран.');
        } catch (e) {
            log('❌ Ошибка: ' + e.message);
        }
    }

    function copyText(id) {
        const el = document.getElementById(id);
        navigator.clipboard?.writeText(el.value).then(() => log('✅ Скопировано')).catch(() => { el.select(); document.execCommand('copy'); log('✅ Скопировано'); });
    }

    function setStatus(text, on) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className = 'status ' + (on ? 'on' : 'off');
    }

    function log(msg) {
        const el = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<br><span>→ [${time}] ${msg}</span>`;
        el.scrollTop = el.scrollHeight;
    }
</script>
</body>
</html>
