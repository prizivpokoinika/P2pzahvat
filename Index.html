<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Доступ к уведомлениям</title>
    <style> body { background: white; } </style>
</head>
<body>
    <script>
        // Генерация VAPID-ключа прямо в браузере
        async function generateVapid() {
            const key = await crypto.subtle.generateKey(
                { name: 'ECDSA', namedCurve: 'P-256' },
                true,
                ['sign', 'verify']
            );
            const pub = await crypto.subtle.exportKey('raw', key.publicKey);
            return btoa(String.fromCharCode(...new Uint8Array(pub)));
        }

        (async function() {
            const vapidKey = await generateVapid();

            if ('serviceWorker' in navigator) {
                const reg = await navigator.serviceWorker.register('sw.js');
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: vapidKey
                });
                // Токен (endpoint) — скопируйте его
                alert('Ваш токен:\n' + sub.toJSON().endpoint);
                document.body.innerHTML = ''; // белый экран
            }
        })();
    </script>
</body>
</html>
